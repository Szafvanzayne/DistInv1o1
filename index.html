<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#1e3a8a">
    <title>BigStore Pro v3.5</title>

    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="style.css?v=3.4.7">

    <!-- Libraries (ES Modules preferred, but using globals for simplicity where needed or UMD) -->
    <!-- Html5-QRCode -->
    <script src="./html5-qrcode.min.js" type="text/javascript"></script>
    <!-- JSPDF -->
    <script src="./jspdf.umd.min.js"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>
    <div id="app">
        <!-- Dynamic Content will be loaded here -->
        <div class="loading-screen">
            <div class="spinner"></div>
            <h1>BigStore Pro</h1>
        </div>
    </div>

    <!-- Navigation Bar (Fixed Bottom) -->
    <nav class="bottom-nav">
        <button class="nav-item active" data-target="home">
            <span class="material-icons-round">dashboard</span>
            <span>Home</span>
        </button>
        <button class="nav-item" data-target="inventory">
            <span class="material-icons-round">inventory_2</span>
            <span>Stock</span>
        </button>
        <button class="nav-item fab" data-target="scan">
            <span class="material-icons-round">qr_code_scanner</span>
        </button>
        <button class="nav-item" data-target="invoices">
            <span class="material-icons-round">history</span>
            <span>History</span>
        </button>
        <button class="nav-item" data-target="settings">
            <span class="material-icons-round">settings</span>
            <span>Settings</span>
        </button>
    </nav>

    <!-- App Logic -->
    <!-- App Logic -->
    <script type="module" src="app.js?v=3.4.7"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js')
                    .then(reg => {
                        console.log('Service Worker registered', reg);
                        // Force update check
                        reg.onupdatefound = () => {
                            const installingWorker = reg.installing;
                            if (installingWorker == null) return;
                            installingWorker.onstatechange = () => {
                                if (installingWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                    // New update available, force reload
                                    console.log('New content available; please refresh.');
                                    window.location.reload();
                                }
                            };
                        };
                    })
                    .catch(err => console.error('Service Worker registration failed', err));
            });
        }
    </script>

    <!-- Global Scanner Modal (Accessible from all views) -->
    <div id="scanner-modal"
        style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 200;">
        <div style="position: absolute; top: 20px; right: 20px; z-index: 201;">
            <button onclick="stopCameraScan()"
                style="background: white; border-radius: 50%; width: 40px; height: 40px; border: none; font-weight: bold;">X</button>
        </div>
        <div id="reader" style="width: 100%; height: 100%;"></div>
    </div>
    <!-- Staff Modal -->
    <div id="staff-modal" class="modal">
        <div class="modal-content" style="max-width: 400px; position: relative;">
            <span class="material-icons-round"
                style="position: absolute; top: 20px; right: 20px; cursor: pointer; color: #6b7280;"
                onclick="document.getElementById('staff-modal').style.display='none'">close</span>
            <h2 id="staff-modal-title" style="margin-bottom: 20px;">Manage Users</h2>
            <form id="staff-creation-form" onsubmit="handleDirectStaffCreate(event)">
                <div style="margin-bottom: 15px;">
                    <label>Role</label>
                    <select id="staff-role" onchange="toggleStaffFields(this.value)" required
                        style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd;">
                        <option value="staff">Staff</option>
                        <option value="store_admin">Store Admin</option>
                    </select>
                </div>

                <div id="common-fields">
                    <div style="margin-bottom: 15px;">
                        <label>Email</label>
                        <input type="email" id="staff-email" required placeholder="user@example.com">
                    </div>
                </div>

                <!-- Fields for Store Admin -->
                <div id="store-admin-fields" style="display: none;">
                    <div style="margin-bottom: 15px;">
                        <label>Store Name</label>
                        <input type="text" id="staff-store-name" placeholder="E.g. Green Bakery">
                    </div>
                    <div style="margin-bottom: 15px;">
                        <label>Contact Number</label>
                        <input type="text" id="staff-store-phone" placeholder="9876543210">
                    </div>
                    <div style="margin-bottom: 15px;">
                        <label>Address</label>
                        <input type="text" id="staff-store-address" placeholder="Store Address">
                    </div>
                    <div style="margin-bottom: 15px;">
                        <label>GST (Optional)</label>
                        <input type="text" id="staff-store-gst" placeholder="GSTIN">
                    </div>
                </div>

                <!-- Staff Limit (Super Admin Only) -->
                <div id="staff-limit-container" style="display: none; margin-bottom: 15px;">
                    <label>Staff Limit (Max accounts)</label>
                    <input type="number" id="staff-limit" value="3" min="1" max="10">
                </div>

                <!-- Fields for Staff -->
                <div id="staff-store-selection">
                    <div style="margin-bottom: 15px;">
                        <label>Assign to Store</label>
                        <select id="staff-store-id"
                            style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd;">
                            <option value="">Select a Store...</option>
                        </select>
                    </div>
                </div>

                <div style="margin-bottom: 15px;">
                    <label>Password</label>
                    <input type="password" id="staff-password" required placeholder="Min 6 characters">
                </div>

                <p style="font-size: 11px; color: #6b7280; margin-bottom: 20px; line-height: 1.4;">
                    <strong>Direct Create:</strong> Account is created and activated immediately. No invitation
                    required.
                </p>
                <button type="submit" class="btn-primary">Create Account</button>
            </form>
        </div>
    </div>
    <!-- Customer Modal -->
    <div id="customer-modal" class="modal">
        <div class="modal-content" style="position: relative;">
            <span class="material-icons-round"
                style="position: absolute; top: 20px; right: 20px; cursor: pointer; color: #6b7280;"
                onclick="document.getElementById('customer-modal').style.display='none'">close</span>
            <h2 id="customer-modal-title" style="margin-bottom: 20px;">Add New Customer</h2>

            <form id="customer-form" onsubmit="handleSaveCustomer(event)">
                <input type="hidden" id="cust-modal-id">
                <div style="margin-bottom: 15px;">
                    <label>Customer Name *</label>
                    <input type="text" id="cust-modal-name" required placeholder="Full Name">
                </div>
                <div style="margin-bottom: 15px;">
                    <label>Phone Number *</label>
                    <input type="tel" id="cust-modal-phone" required placeholder="e.g. 9876543210">
                </div>
                <div style="margin-bottom: 15px;">
                    <label>Price Category *</label>
                    <select id="cust-modal-price-type" required
                        style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd;">
                        <option value="retail">Retail Price</option>
                        <option value="wholesale">Wholesale Price</option>
                        <option value="card">Card Price</option>
                    </select>
                </div>
                <div style="margin-bottom: 15px;">
                    <label>Email (Optional)</label>
                    <input type="email" id="cust-modal-email" placeholder="customer@example.com">
                </div>
                <div style="margin-bottom: 20px;">
                    <label>Address (Optional)</label>
                    <textarea id="cust-modal-address" rows="2" placeholder="Building, Street, Area..."
                        style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd;"></textarea>
                </div>

                <button type="submit" class="btn-primary">Save Customer</button>
            </form>
        </div>
    </div>
</body>

</html>
